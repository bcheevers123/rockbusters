  intro: "Right, Cocktailbusters. Three classic cocktails hiding in these phonetic clues. Say them out loud and you'll hear the answer."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
  clues:
    - number: 1
      initials: M
      clue: "There's a bloke called Mo, right, and he's absolutely roasting. Proper sweating. And then he just goes oh. That's it. Mo. Heat. Oh."
      answer: Mojito
      aliases:
        - mojito
      reasoning: "Mo (a bloke's name, short for Mohammed or Maurice) + heat (really hot, roasting) + oh (just the sound) = Mo-heat-oh = Mojito. Say it: mo-heat-o."

    - number: 2
      initials: C
      clue: "Someone's clearing a floor with a bucket and they've got the thing attached to a stick - you know the thing - and it's a bit lit up, and there's a man. All happening at the same time."
      answer: Cosmopolitan
      aliases:
        - cosmopolitan
      reasoning: "cos (because, the word cos) + mop (the floor-cleaning implement on a stick) + o (just the sound) + lit (illuminated, glowing) + an (a man, or just the word an) = cos-mop-o-lit-an = Cosmopolitan."

    - number: 3
      initials: H W B
      clue: "Right, there's a fella called Harvey and he's only gone and headbutted a partition. Straight into it. What's he done that for?"
      answer: Harvey Wallbanger
      aliases:
        - harvey wallbanger
      reasoning: "Harvey (a man's name) + wall (a partition, a dividing structure) + bang (to hit something hard, a headbutt) + er (the suffix, someone who does the action) = Harvey-Wall-bang-er = Harvey Wallbanger."

