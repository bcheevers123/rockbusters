      answer: Tequila Sunrise
      aliases:
        - tequila sunrise
      reasoning: "te-kill-a (to kill her, sounds like tequila said fast: te-kill-a) + sunrise (the sun coming up over the horizon in the morning) = Tequila Sunrise. Say it out loud: te-kill-a sun-rise."

    - number: 3
