      answer: Espresso Martini
      aliases:
        - espresso martini
      reasoning: "es-press (the express presses something, es-press-o sounds like espresso) + oh (the sound) + mar (the prefix) + teeny (very very small) = espresso-mar-teeny = Espresso Martini."

