  intro: History Busters. More historical figures.
  prize: Email in. Winner gets a bronze plaque with the wrong dates on it.
  clues:
  - number: 1
    initials: J C
    clue: Crossing a piece of water — gone all Roman and started stabbing his friends in the senate.
    answer: Julius Caesar
    aliases:
    - julius caesar
    reasoning: Julius (a name) + Caesar (a name/Roman emperor) = Julius Caesar
  - number: 2
    initials: C
    clue: An Egyptian queen — had a nose that supposedly changed the course of history.
    answer: Cleopatra
    aliases:
    - cleopatra
    reasoning: Cleopatra (the Egyptian queen) = Cleopatra
  - number: 3
    initials: A T H
    clue: A warrior on horseback — went all nomadic and started conquering most of Europe and Asia.
    answer: Attila the Hun
    aliases:
    - attila the hun
    reasoning: Attila (a name) + the + Hun (a nomadic people) = Attila the Hun
