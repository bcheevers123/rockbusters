  intro: Extremeweatherbusters. Extreme weather, phonetic clues, say them out loud. If you're reading them silently and expecting that to work, it won't. You have been warned.
  prize: Email in. Winner gets an AOL trial disc and a mug from a company that no longer exists.
  clues:
  - number: 1
    initials: H
    clue: A woman has gone on holiday somewhere really warm and she's bought some sort of hat, one of them ones that keeps nothing out. Her neck is bright red. She knew it would happen.
    answer: Heatwave
    aliases:
    - heatwave
    - heat wave
    reasoning: heat (sounds like 'heat', warmth) + wave (sounds like 'wave', a gesture or an ocean wave) = Heat-wave = Heatwave
  - number: 2
    initials: WW
    clue: A gust of wind has come round a corner and gone absolutely mad, spinning about, picking things up, acting like it owns the place. A woman's hat has gone. She's not happy about the hat.
    answer: Whirlwind
    aliases:
    - whirlwind
    - whirl wind
    reasoning: whirl (sounds like 'whirl', to spin rapidly) + wind (sounds like 'wind', moving air) = Whirl-wind = Whirlwind
  - number: 3
    initials: TS
    clue: A fella called Thun is in a drum kit shop. He's asking about something that rumbles. He keeps doing an impression of the sound he wants. The shop assistant thinks he wants a bass drum but he doesn't.
    answer: Thunderstorm
    aliases:
    - thunderstorm
    - thunder storm
    reasoning: thun (sounds like 'thun', as in Thun, a Swiss city, or thunder without the 'der') + der (sounds like 'der', a confused filler) + storm (sounds like 'storm', bad weather) = Thun-der-storm = Thunderstorm
