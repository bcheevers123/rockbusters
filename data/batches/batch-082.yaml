- id: extremeweatherbusters-001
  enabled: true
  title: Extremeweatherbusters
  topic: extreme weather events
  difficulty: hard
  office_safe: true
  region_relevance:
  - Global
  intro: Right, Extremeweatherbusters. All extreme weather events hiding in the sounds of these clues. Say them out loud. Don't try and work it out on paper, that won't help. It's about what it sounds like, not what it looks like.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: H
    clue: A bloke called Rick has gone and hurt his shin again. Third time this week. His nan is not impressed. She's sent him a card but she's not coming round.
    answer: Hurricane
    aliases:
    - hurricane
    reasoning: hurri (sounds like 'hurry', to rush, or 'her-ree') + cane (sounds like 'cane', a walking stick or sugarcane) = Hurri-cane = Hurricane
  - number: 2
    initials: T
    clue: A fella called Al has gone shopping for a birthday. He's come back with something that spins. He's not sure who it's for but it was on offer and it looked good.
    answer: Tornado
    aliases:
    - tornado
    reasoning: tor (sounds like 'tore', past tense of tear) + nay (sounds like 'nay', a refusal) + do (sounds like 'do', to do something) = Tor-nay-do = Tornado
  - number: 3
    initials: B
    clue: A woman called Liz has gone somewhere very cold and she's had a bit of a dizzy spell. She's fine but she sat down in the snow for a bit. Everyone was quite concerned.
    answer: Blizzard
    aliases:
    - blizzard
    reasoning: bliz (sounds like 'bliss', pure happiness, just without the s) + ard (sounds like 'ard', northern English for hard, or just 'ard') = Bliz-ard = Blizzard
- id: extremeweatherbusters-002
  enabled: true
  title: Extremeweatherbusters
  topic: extreme weather events
  difficulty: hard
  office_safe: true
  region_relevance:
  - Global
  intro: Extremeweatherbusters two. More extreme weather in the sounds. You need to say these out loud and let your brain figure it out. Your brain knows the answer already, it just needs a minute.
  prize: Email in. Winner gets a Blockbuster loyalty card and a Now 52 cassette.
  clues:
  - number: 1
    initials: T
    clue: A bloke from Thailand is flying a kite on top of a massive wave. The kite looks like a phone. It's not a phone, it's a kite. He seems very calm about the situation.
    answer: Typhoon
    aliases:
    - typhoon
    reasoning: ty (sounds like 'tie', to tie something up) + phoon (sounds like 'foon', or 'phone' said quickly without the e) = Ty-phoon = Typhoon
  - number: 2
    initials: T
    clue: Someone has been in a wave and it's gone right over them. Their mate Sue is at the shore looking a bit worried. She's got a towel but it won't be enough.
    answer: Tsunami
    aliases:
    - tsunami
    reasoning: tsu (sounds like 'soo', as in Sue, a name) + nami (sounds like 'nah-me', or 'nammy', like a nan figure) = Soo-nami = Tsunami
  - number: 3
    initials: M
    clue: A lad called Marvin has gone to visit his son, just turned up on a Wednesday. Very wet outside. Marvin's brought biscuits. The son wasn't expecting him but he's alright about it.
    answer: Monsoon
    aliases:
    - monsoon
    reasoning: mon (sounds like 'mon', as in Monday, or 'mon' meaning my in some languages) + soon (sounds like 'soon', not long now) = Mon-soon = Monsoon
- id: extremeweatherbusters-003
  enabled: true
  title: Extremeweatherbusters
  topic: extreme weather events
  difficulty: hard
  office_safe: true
