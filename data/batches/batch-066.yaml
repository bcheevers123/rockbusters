      aliases:
        - flugelhorn
        - flügelhorn
      reasoning: "flugel-horn. Flugel (sounds like 'frugal' or 'floo-gel', something French and a bit fancy) + horn (a thing water comes out of, like a nozzle or spout) = Flugelhorn"
