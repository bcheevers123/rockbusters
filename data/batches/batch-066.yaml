- id: instrumentbusters-001
  enabled: true
  title: Instrumentbusters
  topic: Musical instruments
  difficulty: hard
  office_safe: true
  region_relevance:
    - Global
  intro: "Right, Instrumentbusters. Phonetic clues, all musical instruments in the answers. Say them out loud or you'll get nowhere."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
  clues:
    - number: 1
      initials: X
      clue: "A bloke called Simon's got a mobile phone. He's decided to ring it. That's the whole thing."
      answer: Xylophone
      aliases:
        - xylophone
      reasoning: "zy-lo-phone sounds like 'Sy-lo-phone'. Sy (short for Simon) + lo (low) + phone (mobile, ring it) = Xylophone"
    - number: 2
      initials: T
      clue: "Right, there's a bloke who's been pulling things. On a rope. Three in a row. Getting tired by the third one."
      answer: Trombone
      aliases:
        - trombone
      reasoning: "trom-bone sounds like 'trom-bone'. Trom (sounds like 'drawn', or dragging/pulling) + bone (what you throw a dog, or a solid pull) = Trombone. More precisely: trow + m + bone. The slide is pulled. 'Three in a row' and 'bone' = trombone"
    - number: 3
      initials: H
      clue: "Some woman's had a card delivered. Big one. From her son. She's a bit tearful about it. Happy though."
      answer: Harpsichord
      aliases:
        - harpsichord
      reasoning: "harps-i-chord. Harp (instrument) + si (she) + chord (from card, sounds like 'cord') = harpsichord. Or: harps (she's tearful and happy = harps on about it) + i + chord (a card, a cord) = Harpsichord"

- id: instrumentbusters-002
  enabled: true
  title: Instrumentbusters
  topic: Musical instruments
  difficulty: hard
  office_safe: true
  region_relevance:
    - Global
  intro: "Instrumentbusters two. Three more instruments hiding in these phonetic clues. It helps if you say them out loud, really."
  prize: "Email in. Winner gets an AOL trial disc and a mug from a company that no longer exists."
  clues:
    - number: 1
      initials: A
      clue: "That fella's agreed to do something. Nodded along to it. Said he was in. Can't back out now."
      answer: Accordion
      aliases:
        - accordion
      reasoning: "ac-cord-i-on. Accord (agreement, nodded along) + i + on (he's in, can't back out) = Accordion"
    - number: 2
      initials: D
      clue: "Right, there's a bloke called Derek. He's gone and done a little job. Dug something out. In Australia."
      answer: Didgeridoo
      aliases:
        - didgeridoo
        - didjeridu
      reasoning: "didgeri-doo. Didgeri (sounds like 'Didgery', or Derek-y, a bloke called Derek) + doo (sounds like 'do', done a little job) = Didgeridoo. Derek + he + redo. Did + geri + do = Didgeridoo"
    - number: 3
      initials: T
      clue: "Someone's been in the cupboard where you keep your stuff. Had a proper rummage in there. Found something odd."
      answer: Theremin
      aliases:
        - theremin
      reasoning: "there-min. There (in the cupboard, in there) + min (sounds like 'rummage' reduced, or 'min' as in minimum/small thing) = Theremin. 'In there' + 'min' = Theremin"

