    - number: 1
      initials: B
      clue: "Right, a Russian fella's gone and put his chips in a lake. Dropped the whole bag in. Just standing there watching them sink."
      answer: Balalaika
      aliases:
        - balalaika
      reasoning: "bala-lai-ka. Bala (sounds like 'baller', a lad) + lai (sounds like 'lie', or 'lake') + ka (sounds like 'car' or just the ending) = Balalaika. More specifically: bala (a place or bag) + lake + a = Balalaika"
    - number: 2
      initials: B
      clue: "Someone's called in a Greek fella. His name's Zuki. He's come over to sort the electrics. Bit of a specialist."
