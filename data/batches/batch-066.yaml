      aliases:
        - bouzouki
        - buzuki
      reasoning: "bou-zouki. Bou (sounds like 'boo', called him in) + zouki (sounds like 'Zuki', the Greek fella's name) = Bouzouki"
    - number: 3
      initials: F
      clue: "That thing in the corner of the garden where water comes out. It's gone a bit French. Got a beret on and everything."
