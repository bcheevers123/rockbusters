  intro: Right, Pastabusters. It's Rockbusters but all the answers are types of pasta. Say the clues out loud. The pasta name is hiding in the sounds somewhere.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: T
    clue: A man called Tag has just been told off in a very long, drawn-out way. Someone's literally laid into him. And then a woman called Ellie turned up at the end. Don't know why.
    answer: Tagliatelle
    aliases:
    - tagliatelle
    reasoning: tag (a label, or to tag someone) + lia (sounds like 'lear', or 'lia', a name) + tell (to tell someone off) + e (a sound at the end) = Tag-lia-tell-e = Tagliatelle
  - number: 2
    initials: F
    clue: A bloke who's been away on a business trip has flown back wearing a bow tie. Seems overdressed for the airport. Very flappy about it.
    answer: Farfalle
    aliases:
    - farfalle
    - farfalle pasta
    - bow tie pasta
    reasoning: far (far away, a distance) + fall (to fall, or autumn) + e (a sound) = Far-fall-e = Farfalle. Farfalle means butterflies in Italian, which look like bow ties.
  - number: 3
    initials: L
    clue: A man called Ling has only gone and spoken in a very long, flat, drawn-out way. Like he's reading from a very thin script. Edge to edge.
    answer: Linguine
    aliases:
    - linguine
    - linguini
    reasoning: lingu (sounds like 'lingua', a tongue, or speech) + een (a long drawn-out sound) + e = Lingu-een-e = Linguine. Linguine means little tongues in Italian.
