    answer: Rigatoni
    aliases:
    - rigatoni
    reasoning: rig (to rig something, or the name Rig) + a (the article) + toni (sounds like 'Tony' or 'Toni', a name) = Rig-a-toni = Rigatoni
  - number: 2
    initials: G
    clue: Someone in Italy has knocked on the door, very quietly, like they're not sure they should be there, and then sat down without being asked. Nobody's said anything. There's potato involved.
    answer: Gnocchi
    aliases:
    - gnocchi
    reasoning: g (silent, like a quiet knock) + noc (sounds like 'knock', a tap on the door) + chi (sounds like 'key', or 'ki') = Gnocchi. The G is silent, so it sounds like 'nyok-ee'.
  - number: 3
    initials: P
    clue: A man with very large ears has been working in a field. He's done a good job and now someone's offering him a pen. As a reward. For the ears situation.
    answer: Penne
    aliases:
    - penne
    - penne pasta
    reasoning: pen (a writing pen, or a pen for animals) + ne (sounds like 'nay', or just the ending) = Pen-ne = Penne. Penne means quills in Italian.
