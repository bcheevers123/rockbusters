  intro: Film Busters. Three more films.
  prize: Email in. Winner gets a director's cut that's forty minutes too long.
  clues:
  - number: 1
    initials: F F
    clue: A quick walker — gone all Southern American and started running across the country with a box of chocolates.
    answer: Forrest Gump
    aliases:
    - forrest gump
    reasoning: Forrest (a name/a forest) + Gump (a name) = Forrest Gump
  - number: 2
    initials: G
    clue: Phantom-catching equipment — gone all paranormal and started busting things in New York.
    answer: Ghostbusters
    aliases:
    - ghostbusters
    reasoning: Ghost (spirit) + busters (those who bust) = Ghostbusters
  - number: 3
    initials: J P
    clue: A large extinct creature — gone all theme park and started eating visitors.
    answer: Jurassic Park
    aliases:
    - jurassic park
    reasoning: Jurassic (prehistoric era) + Park (an outdoor recreation area) = Jurassic Park
