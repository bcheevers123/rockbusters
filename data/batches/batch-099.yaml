- id: primeministersbusters-004
  enabled: true
  title: Prime Ministers Busters
  topic: UK Prime Ministers
  difficulty: medium
  office_safe: true
  region_relevance:
  - UK
  intro: Prime Ministers Busters. Older ones now. Full names, all phonetic.
  prize: Email in. Winner gets a black door with a number on it.
  clues:
  - number: 1
    initials: H W
    clue: A bloke called Harold who's gone off to get some water from a well. Very determined about it.
    answer: Harold Wilson
    aliases:
    - harold wilson
    reasoning: Harold (a name) + Wilson (son of Will) = Harold Wilson
  - number: 2
    initials: E H
    clue: A patch of open land covered in purple flowers — it's gone all grand and put on a suit.
    answer: Edward Heath
    aliases:
    - edward heath
    reasoning: Edward (a name) + Heath (open land with heather) = Edward Heath
  - number: 3
    initials: W C
    clue: A person who wins things — goes into small rooms and comes out victorious.
    answer: Winston Churchill
    aliases:
    - winston churchill
    reasoning: Winston (a name) + Churchill (church + hill) = Winston Churchill
