  intro: Game Show Busters. Three more famous TV quizzes.
  prize: Email in. Winner gets a lifetime supply of incorrect final answers.
  clues:
  - number: 1
    initials: D O N D
    clue: That thing you do when you make an agreement — someone's telling you not to do it. Peculiar request.
    answer: Deal or No Deal
    aliases:
    - deal or no deal
    reasoning: Deal + or + No + Deal = Deal or No Deal
  - number: 2
    initials: C
    clue: A clock going backwards — people shouting letters at a screen on a weekday afternoon.
    answer: Countdown
    aliases:
    - countdown
    reasoning: countdown (counting down from a number) = Countdown
  - number: 3
    initials: T W L
    clue: That thing you can't do when you're strong — gone all Anne Robinson and started being nasty.
    answer: The Weakest Link
    aliases:
    - the weakest link
    reasoning: the + weakest + link (a chain component) = The Weakest Link
