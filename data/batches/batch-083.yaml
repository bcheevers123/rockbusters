  intro: Anatomybusters two. Still body parts, still phonetic. These are the ones they make you learn at school and then you immediately forget.
  prize: Email in. Winner gets a Blockbuster loyalty card and a Now 52 cassette.
  clues:
  - number: 1
    initials: P
    clue: She fell over, and well, blimey. Just went down. Said something like 'oh, jeez' on the way. Bit of a tumble.
    answer: Phalanges
    aliases:
    - phalanges
    - phalanx
    reasoning: 'fuh + lan + jeez = fuh-LAN-jeez = Phalanges. As in: she fell, and jeez.'
  - number: 2
    initials: M
    clue: He bumped into a mate outside the car park. Just stood there chatting. His mate owns a car, that's sort of the whole story.
    answer: Metacarpal
    aliases:
    - metacarpal
    - metacarpals
    reasoning: met + a + car + pal = met-a-car-pal = Metacarpal. Phonetically spot on.
  - number: 3
    initials: M
    clue: He ran into a woman called Sal who works in road maintenance. She was covered in tar. Just standing there.
    answer: Metatarsal
    aliases:
    - metatarsal
    - metatarsals
    reasoning: met + a + tar + sal = met-a-tar-sal = Metatarsal. Met a tar, Sal.
