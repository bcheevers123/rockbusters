  intro: Right, Anatomybusters. It's all body parts. Proper ones, not the obvious ones. Say the clues out loud - the answer's in the sounds somewhere.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: C
    clue: There's a woman called Sarah and she's gone and rung the bell at him. Just stood there and rang it. Didn't say anything. Bell him, Sarah.
    answer: Cerebellum
    aliases:
    - cerebellum
    reasoning: 'Sarah + bell + um = cer-a-bell-um = Cerebellum. Say it: Sarah-bell-um.'
  - number: 2
    initials: C
    clue: Someone's made a small vehicle entirely out of clay. Just sat there on the table. Bit of an odd project but there you go.
    answer: Clavicle
    aliases:
    - clavicle
    reasoning: 'clay + vehicle = clay-vih-kul = Clavicle. Say it fast: clay-vick-ul.'
  - number: 3
    initials: D
    clue: Right, they've gone and dyed a picture frame. Whole thing. Didn't need doing but someone's gone ahead and done it anyway.
    answer: Diaphragm
    aliases:
    - diaphragm
    reasoning: dye + a + frame = dye-a-fram = Diaphragm. Say it out loud.
