  clues:
  - number: 1
    initials: T
    clue: Right, the trapeze act. It was us up there. On the wire. We were the ones doing it. Bit unexpected, really.
    answer: Trapezius
    aliases:
    - trapezius
    reasoning: trapeze + us = tra-PEE-zee-us = Trapezius. The trapeze, it's us.
  - number: 2
    initials: Q
    clue: Someone's gone into the school courtyard - the square one with the benches - and they're doing something involving rye bread and it's all gone a bit off. Smells.
    answer: Quadriceps
    aliases:
    - quadriceps
    - quads
    reasoning: quad + rye + seps (septic) = KWOD-rih-seps = Quadriceps. The quad, the rye, something gone off.
  - number: 3
    initials: H
    clue: Someone's tied a piece of string round a ham. Don't know why. Just looped it round and left it there. That's all that happened.
    answer: Hamstring
    aliases:
    - hamstring
    - hamstrings
    reasoning: ham + string = ham-string = Hamstring. String tied round a ham. Simple as that.
