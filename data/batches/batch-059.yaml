  intro: "Cyberbusters two. All things internet security. Say these out loud. The sounds are what matter, not the spelling."
  prize: "Email in. Winner gets an AOL trial disc and a mug from a company that no longer exists."
  clues:
    - number: 1
      initials: M
      clue: "Something has viciously attacked a bloke who was just stood there in his best outfit. Completely unprovoked. He's still wearing it, to be fair."
      answer: Malware
      aliases:
        - malware
      reasoning: "maul (to attack, sounds like 'mal') + ware (something worn, or software) = Maul-ware = Malware"
    - number: 2
      initials: D W
      clue: "A spider has gone somewhere it really shouldn't. Very dim in there. It's not coming back out and it won't say what it found."
      answer: Dark Web
      aliases:
        - dark web
        - the dark web
      reasoning: "dark (very dim, no light) + web (a spider's web, also the internet) = Dark Web"
    - number: 3
      initials: T F
      clue: "A pair of things, just two of them, have been to a factory and come out having multiplied. There were two going in and considerably more coming out."
      answer: Two Factor
      aliases:
        - two factor
        - two factor authentication
        - 2fa
      reasoning: "two (a pair, the number 2) + factor (something that multiplies, or a factory operative) = Two-Factor"

- id: cyberbusters-003
