  intro: "Right, Cyberbusters. Same rules as always, say the clues out loud and the answer's hiding in the sounds somewhere. All cybersecurity this time."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
  clues:
    - number: 1
      initials: P
      clue: "A fish has taken up a hobby. Not swimming. Something else. A leisure activity. It's casting a line, which is ironic, but that's what it's doing."
      answer: Phishing
      aliases:
        - phishing
      reasoning: "fish (a fish, an aquatic creature) + ing (doing a hobby, present participle) = Fish-ing = Phishing"
    - number: 2
      initials: R
      clue: "A bloke has done a quick sprint, then stopped to do a bit of arithmetic, then put on a coat. All three things. In that order. Nobody knows why."
      answer: Ransomware
      aliases:
        - ransomware
      reasoning: "ran (sprinted, past tense of run) + som (sounds like 'sum', a piece of arithmetic) + ware (something you wear, or software) = Ran-som-ware = Ransomware"
    - number: 3
      initials: F W
      clue: "There's been a bit of a blaze and it's hit a load of bricks. The bricks are fine. They're not bothered. The fire is out now."
      answer: Firewall
      aliases:
        - firewall
      reasoning: "fire (a blaze, flames) + wall (a structure made of bricks) = Fire-wall = Firewall"

- id: cyberbusters-002
