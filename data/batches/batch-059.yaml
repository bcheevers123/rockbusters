  intro: "Three. Cyberbusters three. Last of this batch. All cybersecurity. The answers are hiding in what the clues sound like."
  prize: "Email in. Winner gets a Blockbuster loyalty card and a Now 52 cassette."
  clues:
    - number: 1
      initials: T H
      clue: "A bloke called John, definitely from Troy, he's been very clear about that, has turned up on a horse. He won't say what's inside it."
      answer: Trojan Horse
      aliases:
        - trojan horse
        - trojan
      reasoning: "Trojan (someone from Troy, adjective for the city of Troy) + horse (a large four-legged animal, also what they famously hid inside) = Trojan Horse"
    - number: 2
      initials: Z D
      clue: "Nothing has happened today. Absolutely nothing. Someone's kept a record of it. Full log. Completely empty."
      answer: Zero Day
      aliases:
        - zero day
        - zero-day
        - 0day
      reasoning: "zero (nothing, the number 0, empty) + day (a 24-hour period, today) = Zero Day"
    - number: 3
      initials: S I
      clue: "A film came out, a sequel to a previous one, and it went straight to the doctor for a jab. Didn't even wait for the reviews."
      answer: SQL Injection
      aliases:
        - sql injection
        - sequel injection
      reasoning: "SQL (pronounced 'sequel', a follow-up film) + injection (a jab, a shot given by a doctor) = Sequel-Injection = SQL Injection"
