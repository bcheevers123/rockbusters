  clues:
    - number: 1
      initials: M M
      clue: "There's a woman - your mum, sort of - and she keeps saying this thing. Over and over. The same sound. Coming out with it repeatedly."
      answer: Mamma Mia
      aliases:
        - mamma mia
        - mama mia
      reasoning: "mamma (mum, mother figure) + mia (sounds like 'me-ah', something said repeatedly as an exclamation) = Mamma Mia. Mam-ma + mee-ah said together."

    - number: 2
      initials: C
      clue: "Right, there's a saucepan. And someone's arrived. And they seem quite pleased about both of those things. That's the gist of it."
      answer: Company
      aliases:
        - company
      reasoning: "come (to arrive, to turn up) + pan (a saucepan, a cooking vessel) + ee (a cheerful sound of satisfaction) = come-pan-ee = Company. Come + pan + ee."

    - number: 3
      initials: J C S
      clue: "A mate of yours is alarmed - and his name's very holy-sounding - and he's been polishing something till it shines. Made it sparkle. He's very pleased."
      answer: Jesus Christ Superstar
      aliases:
        - jesus christ superstar
      reasoning: "Gee-sus (an exclamation + the name, Jesus) + Kry-st (Christ, from the name) + super (brilliant, great) + star (a shining sparkly thing) = Jesus Christ Superstar. Gee-sus + cry-st + super + star."
