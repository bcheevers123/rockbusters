- id: operabusters-001
  enabled: false
  title: Operabusters
  topic: Opera titles
  difficulty: hard
  office_safe: true
  region_relevance:
  - Global
  intro: Right, Operabusters. It's Rockbusters but all the answers are famous operas. Say the clues out loud. The opera is hiding somewhere in the sounds. Might help if you do a little bit of singing.
  prize: Email in. Winner gets a Blockbuster loyalty card and a Now 52 cassette.
  clues:
  - number: 1
    initials: C
    clue: A bloke called Kar has found a man, and that man is wearing a very long coat. Big collar on it. Very dramatic entrance. Everybody's staring.
    answer: Carmen
    aliases:
    - carmen
    reasoning: car (a vehicle, or the name Kar) + men (blokes, more than one fella) = Car-men = Carmen
  - number: 2
    initials: T
    clue: A woman has climbed up on top of a big pile of old tin cans. She's absolutely furious. Nobody's sure why she's up there but she won't come down.
    answer: Tosca
    aliases:
    - tosca
    reasoning: toss (to throw something, or to fling old cans about) + ka (a short sharp sound at the end, like a door slamming) = Toss-ka = Tosca
  - number: 3
    initials: A
    clue: A woman called Ada has gone on a long journey and now she's in Egypt. She's not said much since she arrived. She just keeps looking at the pyramids with her arms folded.
    answer: Aida
    aliases:
    - aida
    reasoning: ay (a drawn-out sound of surprise, like when you spot something big) + ee-da (sounds like 'ida', a name, or someone realising something slowly) = Ay-ee-da = Aida
- id: operabusters-002
  enabled: false
