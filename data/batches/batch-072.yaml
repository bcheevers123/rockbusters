    - number: 1
      initials: P
      clue: "An ancient Greek bloke has turned up with a set of triangles and he's very smug about the long side. Won't stop going on about it."
      answer: Pythagoras
      aliases:
        - pythagoras
      reasoning: "pie (a pastry circle, or the Greek Pi symbol connection) + tha (sounds like 'the') + gore (a bit grim, gory) + us (us, you and me) = Pie-tha-gore-us = Pythagoras"
    - number: 2
      initials: L
      clue: "There's a wooden cabin in a forest and someone's doing a sum in there. Very slow sum. Took most of the afternoon."
      answer: Logarithm
      aliases:
        - logarithm
        - log
      reasoning: "log (a piece of wood, also a cabin) + a (the article) + rith (sounds like 'rhythm', a beat) + m (just the letter sound at the end) = Log-a-rith-m = Logarithm"
    - number: 3
      initials: H
      clue: "A nun called Hippa has gone on a bit of a mission. She's crossing the longest side of a triangle and she's going to be a while."
      answer: Hypotenuse
      aliases:
        - hypotenuse
      reasoning: "hypo (sounds like 'hippo', a large animal, or 'hypa') + ten (the number 10) + use (to use something) = Hypo-ten-use = Hypotenuse"

