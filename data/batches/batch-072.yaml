  intro: "Right, Mathbusters. Rockbusters but it's all maths. Don't panic. You don't need to do any actual sums. Just say the clues out loud and the answer will come to you. Or it won't."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
