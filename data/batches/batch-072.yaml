  intro: "Mathbusters two. Three more maths terms hidden in here somewhere. They sound like ordinary words if you say them right. Which you probably won't, but give it a go."
  prize: "Email in. Winner gets an AOL trial disc and a mug from a company that no longer exists."
  clues:
    - number: 1
      initials: T
      clue: "A bloke's been told to try going on a trip. Something to do with trigonometry, apparently. He's taken three sides of something and gone round them. Seemed unnecessary."
      answer: Trigonometry
      aliases:
        - trigonometry
        - trig
      reasoning: "trig (sounds like 'trig', a shortened casual word) + on (on top of) + om (sounds like 'om', a meditation sound) + et (sounds like 'it' or 'et') + ry (sounds like 'ree') = Trig-on-om-et-ry = Trigonometry"
    - number: 2
      initials: F
      clue: "An Italian bloke, quite old, medieval sort, has been adding up rabbits. Keeps starting with one and then adding them together. He looks very satisfied."
      answer: Fibonacci
      aliases:
        - fibonacci
        - fibonacci sequence
      reasoning: "fee (a charge, money) + bon (French for good, sounds like 'bon') + ach (sounds like 'ach', a mild exclamation) + ee (the sound at the end) = Fee-bon-ach-ee = Fibonacci"
    - number: 3
      initials: C
      clue: "Someone's worked out the distance round the outside of a circle. It's taken ages. They're measuring the rim of a large wheel. Very focused."
      answer: Circumference
      aliases:
        - circumference
      reasoning: "sir (a polite address, like knighthood) + come (to arrive) + fer (sounds like 'fur', an animal coat) + ence (sounds like 'ense' or 'ents') = Sir-come-fer-ence = Circumference"

