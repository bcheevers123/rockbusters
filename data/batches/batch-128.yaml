  intro: History Busters. Three more. All famous names.
  prize: Email in. Winner gets a history podcast that's eighty hours long.
  clues:
  - number: 1
    initials: C C
    clue: A navigator — went all sailing and accidentally discovered somewhere he wasn't looking for.
    answer: Christopher Columbus
    aliases:
    - christopher columbus
    reasoning: Christopher (a name) + Columbus (a name/a city) = Christopher Columbus
  - number: 2
    initials: O C
    clue: A bloke from Ireland — went all Puritan and started chopping off the king's head.
    answer: Oliver Cromwell
    aliases:
    - oliver cromwell
    reasoning: Oliver (a name) + Cromwell (a name) = Oliver Cromwell
  - number: 3
    initials: M Q O S
    clue: A Scottish female monarch — things didn't end well. Very tragic.
    answer: Mary Queen of Scots
    aliases:
    - mary queen of scots
    reasoning: Mary + Queen + of + Scots = Mary Queen of Scots
