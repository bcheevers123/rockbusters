  - number: 2
    initials: Z
    clue: In southern Africa, a bloke has tried to spell something out loud and made it sound like a sneeze in the middle. He's finished the sentence and looked quite pleased with himself. Everyone else is baffled but polite about it.
    answer: Zambezi
    aliases:
    - zambezi
    - zambezi river
    reasoning: zam (sounds like 'zam', a made-up sound, or 'Sam' with a Z) + be (the word 'be', to exist) + zee (sounds like 'zee', the American Z, or just 'ze') = Zam-be-zee = Zambezi
  - number: 3
    initials: V
