  intro: Riverbusters. All rivers from around the world, hiding in phonetic clues. Say them out loud. It's what they sound like, not how they're spelled. Get your ear in.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: Y
    clue: A bloke in China has found a river so long he's had a proper think about his life by the time he reaches the end of it. He started young. He's finished old. His trousers were wet the whole time.
    answer: Yangtze
    aliases:
    - yangtze
    - yangtze river
    - chang jiang
    reasoning: yang (sounds like 'yang', as in yin and yang) + tze (sounds like 'tse', a buzzing fly sound, or just 'tsee') = Yang-tze = Yangtze
  - number: 2
    initials: G
    clue: A woman from India has gone into a river she considers extremely holy and come out feeling brilliant. Her socks are soaked but she's spiritually very sorted. A bloke nearby has his hands together going yes, that's the one.
    answer: Ganges
    aliases:
    - ganges
    - ganges river
    - ganga
    reasoning: gang (sounds like 'gang', a group of people, bit intimidating) + eez (sounds like 'ease', no trouble at all) = Gang-eez = Ganges
  - number: 3
    initials: O
    clue: In Venezuela, someone has ordered something and it's come round, looped back and gone past them again. Very circular situation. They're confused but they keep ordering. The waiter has done about four laps now.
    answer: Orinoco
    aliases:
    - orinoco
    - orinoco river
    reasoning: ori (sounds like 'or-ee', a hesitant sort of noise) + no (the word no, said twice, very decisive) + co (sounds like 'co', as in company, a bit formal) = Or-ee-no-co = Orinoco
