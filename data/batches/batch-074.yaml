      clue: "A bloke called Matt has gone and done something to the west side of something. Quite aggressive about it. He's done it in the middle of a historical drama and no one seems bothered."
      answer: Amethyst
      aliases:
        - amethyst
      reasoning: "am (I am, just existing) + eth (sounds like 'eth', an old letter, or a name) + ist (sounds like 'ist', as in you're doing something) = Am-eth-ist = Amethyst. Say it: am-eth-ist."
    - number: 2
      initials: T
      clue: "Someone has bought a turban and decided it needs a bit of a wash. They've given it a proper rinse. It's come out a bit greenish. Nobody's surprised."
      answer: Turquoise
      aliases:
        - turquoise
      reasoning: "turk (sounds like 'Turk', someone from Turkey) + waz (sounds like 'was', past tense) = Turk-waz = Turquoise. Say it aloud: tur-kwoyz."
    - number: 3
      initials: C
      clue: "A bloke called Carl has found a lion who's in a bit of a state. The lion is making a noise like it needs something. Carl's keeping his distance. Wisely."
      answer: Carnelian
      aliases:
        - carnelian
      reasoning: "car (a vehicle, driving about) + neel (sounds like 'Neil', a name, or to kneel) + ian (a name, very common, very Ian) = Car-neel-ian = Carnelian. Say it: car-neel-ee-un."

