  intro: History Busters. More famous figures from history. All phonetic.
  prize: Email in. Winner gets a Wikipedia page that needs citations.
  clues:
  - number: 1
    initials: N M
    clue: A bloke called Nelson — went to prison, came out, and changed an entire country for the better.
    answer: Nelson Mandela
    aliases:
    - nelson mandela
    reasoning: Nelson (a name) + Mandela (a name) = Nelson Mandela
  - number: 2
    initials: A L
    clue: A very tall honest bloke from America — had a hat, a beard, and freed a lot of people.
    answer: Abraham Lincoln
    aliases:
    - abraham lincoln
    reasoning: Abraham (a name) + Lincoln (a city/a car) = Abraham Lincoln
  - number: 3
    initials: G W
    clue: A bloke who chopped down a cherry tree — became the first president of a very large country.
    answer: George Washington
    aliases:
    - george washington
    reasoning: George (a name) + Washington (a place/a name) = George Washington
