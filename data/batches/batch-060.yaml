  intro: Right, Biologybusters. It's all biology, the sort of thing you'd have had to memorise in school and then immediately forgot. Say the clues out loud. The answer's somewhere in the sounds.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: M
    clue: My toe is in a state. It's got a condition, something wrong with it, and it's been going on for a while. My toe. Con-dry-a.
    answer: Mitochondria
    aliases:
    - mitochondria
    reasoning: my (belonging to me) + toe (the digit on your foot) + con (a swindle, or a prefix meaning with) + dry (not wet) + a (the article) = My-toe-con-dry-a = Mitochondria
  - number: 2
    initials: C
    clue: A fella called Chris has gone to a place in Rome where they vote. He's in there now. Voting away. Very civic-minded.
    answer: Chromosome
    aliases:
    - chromosome
    reasoning: 'chro (sounds like ''crow'', a black bird, or Chris-oh) + mo (sounds like ''mo'', a moment) + some (sounds like ''some'', a quantity, or Rome backwards-ish) = Chro-mo-some = Chromosome. Or: Crow-mo-some, a crow taking a moment in Rome.'
  - number: 3
    initials: A
    clue: A fella called Adren has lined up at the starting blocks. The gun goes off. He's gone. He's absolutely legged it. Very fast man.
    answer: Adrenaline
    aliases:
    - adrenaline
    - adrenalin
    reasoning: adren (sounds like 'adren', the name, or a-dren) + a (the article) + line (a line, like a starting line) = Adren-a-line = Adrenaline
