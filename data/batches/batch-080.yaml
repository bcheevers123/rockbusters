  intro: Right, Treebusters. All the answers are trees. Phonetic clues, so say them out loud. The tree's hiding in the sounds somewhere.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: S
    clue: Someone's had a big sigh and then gone back for extra helpings. Really wanted more of it. Can't help themselves.
    answer: Sycamore
    aliases:
    - sycamore
    reasoning: sigh (a big exhale) + ca + more (wanting extra helpings) = sigh-ca-more = Sycamore
  - number: 2
    initials: M
    clue: There's a fella who's wandered into a small cluster of trees. Just standing in there. In the shade, looking about.
    answer: Mangrove
    aliases:
    - mangrove
    reasoning: man (a fella) + grove (a small cluster of trees) = man-grove = Mangrove
  - number: 3
    initials: H C
    clue: That large animal - the one that pulls the carriage - it's got a big barrel of a chest and it's gone a bit crackers. Not sure what's got into it.
    answer: Horse Chestnut
    aliases:
    - horse chestnut
    - horse-chestnut
    reasoning: horse (the large animal that pulls carriages) + chest (a barrel-shaped torso) + nut (gone crackers/crazy) = Horse Chestnut
