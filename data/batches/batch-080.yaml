  intro: Treebusters two. Still all trees. Still phonetic. Some of these are a bit involved so take your time with them.
  prize: Email in. Winner gets an AOL trial disc and a mug from a company that no longer exists.
  clues:
  - number: 1
    initials: E
    clue: You've gone and called out to us. Shouted over. But there's a lip involved and it's all got a bit fussy from there.
    answer: Eucalyptus
    aliases:
    - eucalyptus
    reasoning: you (addressing us directly) + ca + lip (the thing on your face) + tus (sounds like 'tuss', a fuss) = you-ca-lip-tus = Eucalyptus
  - number: 2
    initials: B
    clue: Right, there's a bay window - like on an old Victorian house - and someone's said oh, and then called their mate bab. All in one breath.
    answer: Baobab
    aliases:
    - baobab
    reasoning: bay (a bay window) + oh (an exclamation) + bab (a term of endearment, like calling someone bab) = bay-oh-bab = Baobab
  - number: 3
    initials: W W
    clue: Someone's been having a right cry about it. Really upset. And they're going to do it. They will. They're going to do it. Oh.
    answer: Weeping Willow
    aliases:
    - weeping willow
    - weeping-willow
    reasoning: weeping (having a good cry) + will (they're going to do it) + ow (an exclamation of resignation, sounds like 'oh') = weeping-will-ow = Weeping Willow
