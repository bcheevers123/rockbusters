    answer: Magnolia
    aliases:
    - magnolia
    reasoning: mag (a glossy magazine) + no (a refusal) + lia (sounds like 'liar', someone telling a lie) = mag-no-lia = Magnolia
  - number: 2
    initials: D F
    clue: Right, there's a bloke called Doug and he's found himself a young Scottish lass and she's wearing a fur coat. Don't know where they met.
    answer: Douglas Fir
    aliases:
    - douglas fir
    reasoning: Doug (a bloke's name) + las (sounds like 'lass', a young Scottish woman) + fur (a fur coat) = Doug-las-fur = Douglas Fir
  - number: 3
    initials: M P
    clue: One of those primates - the smaller ones, not gorillas - has gone and bought itself a jigsaw. Proper stumped by it.
    answer: Monkey Puzzle
    aliases:
    - monkey puzzle
    - monkey-puzzle
    reasoning: monkey (a primate, not a gorilla) + puzzle (a jigsaw, something that stumps you) = monkey-puzzle = Monkey Puzzle
