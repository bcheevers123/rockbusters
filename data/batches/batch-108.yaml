  intro: Castle Busters. Three more. All phonetic.
  prize: Email in. Winner gets a turret with a very cold draught.
  clues:
  - number: 1
    initials: B C
    clue: A Scottish estate where a very famous family goes on holiday — tartan everywhere.
    answer: Balmoral Castle
    aliases:
    - balmoral castle
    reasoning: Balmoral (Scottish royal residence) + Castle = Balmoral Castle
  - number: 2
    initials: S C
    clue: Something that's stopped moving — gone all Scottish and started overlooking a city.
    answer: Stirling Castle
    aliases:
    - stirling castle
    reasoning: Stirling (a Scottish city) + Castle = Stirling Castle
  - number: 3
    initials: D C
    clue: That white stuff on a cliff face — gone all historical and started staring at France.
    answer: Dover Castle
    aliases:
    - dover castle
    reasoning: Dover (white cliffs) + Castle = Dover Castle
