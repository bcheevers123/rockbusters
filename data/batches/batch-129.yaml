    answer: Galileo Galilei
    aliases:
    - galileo galilei
    - galileo
    reasoning: Galileo + Galilei = Galileo Galilei
  - number: 3
    initials: A T H
    clue: A fierce horseman — went all nomadic and terrorised Europe until he ran out of places to conquer.
    answer: Attila the Hun
    aliases:
    - attila the hun
    reasoning: Attila + the + Hun = Attila the Hun
