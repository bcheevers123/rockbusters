- id: landmarkbusters-002
  enabled: true
  title: Landmark Busters
  topic: famous UK landmarks
  difficulty: easy
  office_safe: true
  region_relevance:
  - UK
  intro: Landmark Busters. Three more famous UK landmarks.
  prize: Email in. Winner gets a laminated tourist map from 1987.
  clues:
  - number: 1
    initials: S
    clue: Large rocks arranged in a circle on a plain. Been there for ages. Nobody knows why.
    answer: Stonehenge
    aliases:
    - stonehenge
    reasoning: stone + henge (prehistoric monument type) = Stonehenge
  - number: 2
    initials: A O T N
    clue: A heavenly body — gone all pointy and landed in the north of England.
    answer: Angel of the North
    aliases:
    - angel of the north
    reasoning: Angel (heavenly being) + of + the + North = Angel of the North
  - number: 3
    initials: W C
    clue: A place where the wind blows through a gap — gone all regal and started wearing a crown.
    answer: Windsor Castle
    aliases:
    - windsor castle
    reasoning: Windsor (winds + or) + Castle (fortification) = Windsor Castle
- id: landmarkbusters-003
  enabled: true
  title: Landmark Busters
  topic: famous UK landmarks
  difficulty: easy
  office_safe: true
  region_relevance:
  - UK
  intro: Landmark Busters. Three more. All phonetic, all famous.
  prize: Email in. Winner gets a guided tour of a car park that used to be something interesting.
  clues:
  - number: 1
    initials: H W
    clue: A wall built by a bloke called Adrian — keeps the cold out and the Romans in.
    answer: Hadrian's Wall
    aliases:
    - hadrians wall
    - hadrian's wall
    reasoning: Hadrian's (the emperor) + Wall = Hadrian's Wall
  - number: 2
    initials: T S
    clue: That definite article, followed by something very pointed and glass-covered in London.
    answer: The Shard
    aliases:
    - the shard
    reasoning: The + Shard (a sharp fragment/glass building) = The Shard
  - number: 3
    initials: T S
    clue: A large open area in London — lions on columns, pigeons everywhere, tourists gawping.
    answer: Trafalgar Square
    aliases:
    - trafalgar square
    reasoning: Trafalgar (famous battle) + Square (open public space) = Trafalgar Square
