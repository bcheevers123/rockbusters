  intro: "Right, Mountainbusters. It's Rockbusters but all the answers are famous mountains. Say the clues out loud - the summit's hiding in the sounds somewhere."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
  clues:
    - number: 1
      initials: K
      clue: "There's a fella who's done away with another fella using a ceramic pot. Not sure why he had it out for the pot, but there you go."
      answer: Kilimanjaro
      aliases:
        - kilimanjaro
      reasoning: "kill (done away with) + him (a fella) + a (a) + jar (ceramic pot) + oh (there you go) = kill-him-a-jar-oh = Kilimanjaro"
    - number: 2
      initials: M B
      clue: "Right, it's very important that someone has a wash. The whole thing hinges on it. Can't stress it enough."
      answer: Mont Blanc
      aliases:
        - mont blanc
      reasoning: "mont (sounds like 'mons' or 'more') + blanc (sounds like 'blank' or 'blonk') - 'mon' (French for my) + 'blanc' (blank/white) - sounds like 'mohn blank' = Mont Blanc. Phonetically: a matter that's blank = Mont Blanc"
    - number: 3
      initials: M
      clue: "That bloke could've been a toilet. Literally built for that purpose. But he wasn't. Still walks about though."
      answer: Manaslu
      aliases:
        - manaslu
      reasoning: "man (a bloke) + as (could've been) + loo (a toilet) = man-as-loo = Manaslu"

