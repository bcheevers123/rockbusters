    - number: 1
      initials: P
      clue: "A bloke called Pom has gone on holiday to Italy. He's found a lovely little cafe near a ruin. He's ordered something he can't pronounce. The waiter's not impressed but he's brought it out anyway."
      answer: Pompeii
      aliases:
        - pompeii
      reasoning: "Pom (sounds like 'Pom', a nickname for a British person, or just the name Pom) + pay (sounds like 'pay', what you do at a cafe when the waiter's brought your thing) = Pom-pay = Pompeii"
    - number: 2
      initials: K
      clue: "There's a volcano somewhere warm. A cracker has gone off and woken everyone up on a nearby island. They're not best pleased. The noise went right across the sea. People on the next island heard it and thought it was a kettle."
      answer: Krakatoa
      aliases:
        - krakatoa
        - krakatau
      reasoning: "crack (sounds like 'crack', a loud bang, a fissure in rock) + a (just the letter, one of those) + toe (the smallest digit, end of the foot) + a (again, just the one) = Crack-a-toe-a = Krakatoa"
    - number: 3
      initials: H
      clue: "A fella called Hiro has been to a shima — that's a Japanese island — and he's asked someone what it means. They've told him it means island. He's written it down and come back and shown everyone but nobody cares."
      answer: Hiroshima
      aliases:
        - hiroshima
      reasoning: "Hiro (sounds like 'hero', someone who does something brave, or just the name Hiro) + shima (sounds like 'she-ma', or 'shima', meaning island in Japanese) = Hero-shima = Hiroshima"

