  intro: "Right, Disasterbusters. All famous disasters hiding in the sounds of these clues. Don't look at the spelling. Say them out loud and the sounds'll do it. Some dark history in here but we're keeping it respectful. Mostly."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
