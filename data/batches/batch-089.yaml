- id: elementsbusters-001
  enabled: true
  title: Elementsbusters
  topic: chemical elements
  difficulty: hard
  office_safe: true
  region_relevance:
    - Global
  intro: "Right, Elementsbusters. All chemical elements hiding in the sounds of these clues. Say each one out loud — the phonetics'll do the work. It's not about spelling. It's about what it sounds like when you say it."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
  clues:
    - number: 1
      initials: P
      clue: "A bloke called Ross has been given a job moving heavy things around a factory. He's got a van. He's picking stuff up. The foreman keeps phoning asking where the deliveries are."
      answer: Phosphorus
      aliases:
        - phosphorus
      reasoning: "foss (sounds like 'foss', as in fossil, or a ditch) + for (to move something on behalf of someone) + us (me and you, us lot) = Foss-for-us = Phosphorus"
    - number: 2
      initials: M
      clue: "A woman called Maggie has been told her knees are in a bad way. The doctor has had a look. He's not thrilled. Said she's been overdoing it on some kind of machine."
      answer: Magnesium
      aliases:
        - magnesium
      reasoning: "mag (sounds like 'Mag', short for Maggie) + knee (the joint, goes wrong) + see (to look at something) + um (that noise you make when you're not sure) = Mag-nee-see-um = Magnesium"
    - number: 3
      initials: F
      clue: "A woman called Flo has gone in and had a look at a drain. She's not happy with what she found in there. She's reporting it back but nobody's listening properly."
      answer: Fluorine
      aliases:
        - fluorine
      reasoning: "floo (sounds like 'flew', past tense of fly, or 'flue', a drain pipe) + reen (sounds like 'reen', a drain in West Country slang, or just 'reen') = Floo-reen = Fluorine"

- id: elementsbusters-002
  enabled: true
  title: Elementsbusters
  topic: chemical elements
