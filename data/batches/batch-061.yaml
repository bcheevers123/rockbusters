- id: drugbusters-001
  enabled: false
  title: Drugbusters
  topic: medication names, common pharmaceuticals and prescription drugs
  difficulty: hard
  office_safe: true
  region_relevance:
  - UK
  - US
  - Global
  intro: Right, Drugbusters. Rockbusters but all the answers are medication names. Say the clues out loud. The drug's hiding somewhere in the sounds. Might need a lie down after this one.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: P
    clue: A couple of fellas are heading somewhere, and one of them is called Seth or something, and they've got a moral issue with it. A bit on the fence, ethically speaking.
    answer: Paracetamol
    aliases:
    - paracetamol
    - acetaminophen
    reasoning: para (beside, or a pair going alongside) + ceta (sounds like 'setter', or Seth-a) + mol (sounds like 'moral', the ethical bit) = Para-ceta-mol = Paracetamol
  - number: 2
    initials: W
    clue: A bloke who looks after a prison in a place called Farren has been making notes. He's very thorough. Got a whole logbook.
    answer: Warfarin
    aliases:
    - warfarin
    reasoning: war (a conflict, or warden of a war) + far (at a distance) + in (inside) = War-far-in = Warfarin
  - number: 3
    initials: D
    clue: A man called Di has taken a nap in the middle of a conversation. Just gone. Not rude. He genuinely couldn't help it. It's a bit of a pattern with him.
    answer: Diazepam
    aliases:
    - diazepam
    - valium
    reasoning: dia (sounds like 'Di-a', a name prefix) + ze (sounds like 'ze', going to sleep in French sort of way) + pam (a woman's name, Pam) = Di-aze-pam = Diazepam
