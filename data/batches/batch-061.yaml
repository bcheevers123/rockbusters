  intro: Drugbusters two. More medication names hiding in phonetic clues. You don't need a prescription for this one, just a working pair of ears.
  prize: Email in. Winner gets an AOL trial disc and a mug from a company that no longer exists.
  clues:
  - number: 1
    initials: I
    clue: A bloke called Ivor has gone off to see someone about a roofing job in the middle of nowhere. He's not come back yet. Nobody's concerned though. He does this.
    answer: Ibuprofen
    aliases:
    - ibuprofen
    - nurofen
    reasoning: ibu (sounds like 'Ivor' run together, 'Ibu') + pro (in favour of, or a professional) + fen (a marshy flat place, like the Fens) = Ibu-pro-fen = Ibuprofen
  - number: 2
    initials: M
    clue: A bloke called Mort who owns a farm has been making something in a very large container. Very systematic about it. Wrote it all down.
    answer: Metformin
    aliases:
    - metformin
    - glucophage
    reasoning: met (to meet someone, or met, past tense of meet) + for (on behalf of) + min (minutes, or minimum) = Met-for-min = Metformin
  - number: 3
    initials: S
    clue: A bloke who sells stuff has been sitting in the window of a shop in a really upright posture. Very serious about it. Won't even slouch a bit.
    answer: Sertraline
    aliases:
    - sertraline
    - zoloft
    reasoning: ser (sounds like 'sir', a formal address) + tra (sounds like 'tra', a bit like a tray) + line (a queue, or a line of products) = Ser-tra-line = Sertraline
- id: drugbusters-003
  enabled: false
  title: Drugbusters
  topic: medication names, common pharmaceuticals and prescription drugs
