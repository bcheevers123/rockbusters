  intro: Drugbusters. Medication names hiding in the phonetic clues. Say these out loud and see if the sounds lead anywhere useful. Might not.
  prize: Email in. Winner gets a Blockbuster loyalty card and a Now 52 cassette.
  clues:
  - number: 1
    initials: A
    clue: A bloke called Mox has shown up at a house party and everything's in the process of going wrong. In the most complete way possible.
    answer: Amoxicillin
    aliases:
    - amoxicillin
    - amoxil
    - amoxycillin
    reasoning: a (the article) + mox (sounds like 'Mox', a name) + i (the letter I, or 'eye') + cillin (sounds like 'sill-in', like sitting on a window sill inside) = A-moxi-cillin = Amoxicillin
  - number: 2
    initials: O
    clue: A man called Omar has gone to a really small place, barely a village, just to have a look at things. He's noted everything down. Very thorough.
    answer: Omeprazole
    aliases:
    - omeprazole
    - losec
    - prilosec
    reasoning: ome (sounds like 'Omar' clipped, or 'ohm') + pra (sounds like 'pra', a tiny place or prefix) + zole (sounds like 'sole', the bottom of a shoe, or just the one) = Ome-pra-zole = Omeprazole
  - number: 3
    initials: P
    clue: A fella called Penn has gone and made friends with all of the bacteria in the area. All of them. Very sociable. They've started calling him Pen.
    answer: Penicillin
    aliases:
    - penicillin
    reasoning: pen (a writing instrument, or the name Penn) + i (the letter I) + cillin (sounds like 'sill-in', being inside on a window ledge) = Pen-i-cillin = Penicillin
