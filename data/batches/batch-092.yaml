  clues:
    - number: 1
      initials: H
      clue: "Right, a woman called Hannah's got herself a little vehicle. Not sure why she needs one but there it is."
      answer: Hanukkah
      aliases:
        - hanukkah
        - chanukah
        - hannukah
      reasoning: "Hannah (a woman's name) + car (a vehicle) - drop the r sound = Han-uh-kah = Hanukkah"
    - number: 2
      initials: Y K
      clue: "Someone's having a yawn over a smoked fish. Bit rude. The fish hasn't done anything wrong."
      answer: Yom Kippur
      aliases:
        - yom kippur
      reasoning: "yom (sounds like 'yawn' said quickly) + kipper (a smoked fish) + sounds like 'ur' at the end = Yom Kippur"
    - number: 3
      initials: V
      clue: "There's a V-shape and someone's put their bag on it. Bit of an odd place to leave a bag."
      answer: Vesak
      aliases:
        - vesak
        - wesak
        - buddha day
      reasoning: "vee (the letter V, a V-shape) + sack (a bag) = Vesak"

