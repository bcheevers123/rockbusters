  clues:
    - number: 1
      initials: R
      clue: "A male sheep's gone and done something. Just sort of... committed to it. Had a proper go. That's all."
      answer: Ramadan
      aliases:
        - ramadan
      reasoning: "ram (a male sheep) + a + dan (a name, sounds like 'done' with a slight accent) = Ramadan"
    - number: 2
      initials: D
      clue: "There's a bloke everyone thinks is a bit of an idiot and he's gone and died. Bit sad really."
      answer: Diwali
      aliases:
        - diwali
        - deepavali
      reasoning: "die (to die, passed on) + wally (a British term for an idiot) = Diwali"
    - number: 3
      initials: P
      clue: "Someone's priced up a writing instrument. Put a label on it. Not cheap either."
      answer: Pentecost
      aliases:
        - pentecost
      reasoning: "pen (a writing instrument) + the + cost (the price of it) = Pentecost"

