      reasoning: "tur (sounds like turn, it's their turn) + mer (sounds like merge, blended in) + ick/rick (the name Rick, or just the sound) = Tur-mer-ic = Turmeric"
    - number: 2
      initials: A
      clue: "A donkey has fetched something - gone and got it - and there's a woman called Ida waiting for it at the other end. The donkey's done the fetch. Ida's just standing there."
      answer: Asafoetida
      aliases:
        - asafoetida
        - asafetida
      reasoning: "ass (a donkey) + a (the article) + foet (sounds like fetched, past tense of fetch, clipped) + ida (the woman's name Ida) = Ass-a-foet-ida = Asafoetida"
    - number: 3
      initials: L G
      clue: "There's a lemon. It's on the grass. That's it. Someone's just left a lemon on the grass and walked off. Nobody's explained why."
      answer: Lemongrass
      aliases:
        - lemongrass
        - lemon grass
      reasoning: "lemon (the yellow citrus fruit) + grass (the green stuff on the ground) = Lemon-grass = Lemongrass"

