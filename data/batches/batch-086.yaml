      clue: "A woman called Sharon has gone to France and someone there has done her a favour. She's not entirely sure what the favour was but she's saying thank you anyway. There's a vineyard involved."
      answer: Chardonnay
      aliases:
        - chardonnay
      reasoning: "char (sounds like 'sha', a sound of gratitude in French-ish) + don (sounds like 'don', to give or a gift) + nay (sounds like 'nay', no, or a refusal, which is ironic given how much people drink it) = Char-don-nay = Chardonnay"
    - number: 2
      initials: S B
      clue: "A bloke is looking over a fence at someone else's field. Very blank expression. Bit nosy. The field is white and he's just gone, yeah, that's that then."
      answer: Sauvignon Blanc
      aliases:
        - sauvignon blanc
        - sauvignon
      reasoning: "sauvi (sounds like 'savvy', to understand) + gnon (sounds like 'nyon', a French-ish town sound) + blanc (sounds like 'blank', empty, nothing there) = Sauvi-gnon Blanc = Sauvignon Blanc"
    - number: 3
      initials: P G
      clue: "A small bloke called Pete has gone grey. Just overnight. Bit of a shock. He's standing in Italy looking quite confused about the whole thing."
      answer: Pinot Grigio
      aliases:
        - pinot grigio
        - pinot gris
      reasoning: "pin (sounds like 'pin', small, sharp) + ot (sounds like 'ot', short, clipped) + grig (sounds like 'grey', going grey) + io (sounds like 'ee-oh', a surprised noise at the end) = Pin-ot Grig-io = Pinot Grigio"

