    clue: There's a man called Lester, and he's gone absolutely crimson. Bright red. Don't know what happened but he's not well.
    answer: Red Leicester
    aliases:
    - red leicester
    reasoning: red (the colour, bright crimson) + Leicester (said as 'Lester', the city) = Red Leicester. Red + Lester said together.
  - number: 2
    initials: S
    clue: A massive weight - a full imperial tonne - it hasn't moved. Been there ages. Just sitting there, perfectly still. Nobody's bothered.
    answer: Stilton
    aliases:
    - stilton
    reasoning: 'still (not moving, stationary) + ton (an imperial unit of weight, very heavy) = still-ton = Stilton. Say it: still-ton.'
  - number: 3
    initials: M
    clue: Right, Morrissey and Ella Fitzgerald are the same person. That's what they're saying. Moz is Ella. Apparently.
    answer: Mozzarella
    aliases:
    - mozzarella
    reasoning: 'Moz (Morrissey''s nickname) + are (to be, as in ''is'') + Ella (Ella Fitzgerald) = Moz-are-Ella = Mozzarella. Say it: Moz-ah-rella.'
