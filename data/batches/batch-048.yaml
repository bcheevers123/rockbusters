- id: cheesebusters-001
  enabled: true
  title: Cheesebusters
  topic: cheese names from around the world
  difficulty: hard
  office_safe: true
  region_relevance:
  - UK
  intro: Right, Cheesebusters. Three cheese names hiding in these phonetic clues. Say them out loud and you'll get there.
  prize: Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station.
  clues:
  - number: 1
    initials: W
    clue: There's a woman called Wensley - unusual name, Wensley - and she's moved into a valley. Just living there now. In the valley.
    answer: Wensleydale
    aliases:
    - wensleydale
    reasoning: 'Wensley (a woman''s name, unusual but there it is) + dale (a valley, like in the Dales) = Wensley-dale = Wensleydale. Say it out loud: Wensley + dale.'
  - number: 2
    initials: G
    clue: Right, someone's absolutely stuffing themselves. Just gorging away. And what they're eating is all the works of that French novelist. Every single book.
    answer: Gorgonzola
    aliases:
    - gorgonzola
    reasoning: 'gorge on (to eat greedily, stuffing yourself) + Zola (Emile Zola, the French novelist) = gorge-on-Zola = Gorgonzola. Say it: gorge-on-Zola.'
  - number: 3
    initials: C
    clue: A bear has turned up at a party. Just walked in. Nobody invited it. It came in and everyone's looking at it.
    answer: Camembert
    aliases:
    - camembert
    reasoning: 'came in (arrived, turned up) + bear (a large furry animal) = came-in-bear = Camembert. Say it quickly: cam-em-bear.'
