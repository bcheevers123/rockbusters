    clue: A golfer hits it exactly average - right on par - then there's me, just standing there, and then that jungle fella who swings on vines shows up. All in a row.
    answer: Parmesan
    aliases:
    - parmesan
    reasoning: 'par (a golf score meaning average) + me (I, myself) + zan (Tarzan, the jungle fella who swings on vines) = par-me-zan = Parmesan. Say it out loud: par-me-zan.'
