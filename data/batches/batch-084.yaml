  intro: "Right, Festivalbusters. Three clues, all world festivals hiding in the sounds. Say each one out loud — the answer's in the phonetics, not the spelling. Off you go."
  prize: "Email in. Winner gets a copy of Shrek on DVD and a keyring from a service station."
  clues:
    - number: 1
      initials: G
      clue: "A woman's gone to visit her nan but she's carrying a very heavy drinking vessel and she keeps stopping to put it down in the road. She's buried it now apparently. Just left it there."
      answer: Glastonbury
      aliases:
        - glastonbury
        - glastonbury festival
      reasoning: "glass (a drinking vessel) + ton (a heavy unit of weight) + bury (to put something in the ground and cover it over) = Glass-ton-bury = Glastonbury"
    - number: 2
      initials: C
      clue: "A sports instructor has taken a shine to a woman called Ella. He's not being weird about it. He's just her coach. She keeps turning up to training and he's going, right, Ella, again."
      answer: Coachella
      aliases:
        - coachella
        - coachella valley music and arts festival
      reasoning: "coach (a person who trains athletes, very focused, whistle) + ella (a common woman's name, slightly old-fashioned) = Coach-ella = Coachella"
    - number: 3
      initials: O
      clue: "Someone's been celebrating the tenth month a bit too enthusiastically. They've organised a party in a tent and it's got a bit out of hand. There's a lot of beer. It is a celebration, which is a kind of fest."
      answer: Oktoberfest
      aliases:
        - oktoberfest
        - october fest
      reasoning: "Oktober (German for October, the tenth month of the year) + fest (a celebration or festival, like a jamboree but less scouts) = Oktober-fest = Oktoberfest"

