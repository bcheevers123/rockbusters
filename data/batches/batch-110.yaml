  intro: Internet Slang Busters. Three final ones.
  prize: Email in. Winner gets a DM that says 'hey'.
  clues:
  - number: 1
    initials: T
    clue: Something that's very popular right now — going up and up on the charts with no explanation.
    answer: Trending
    aliases:
    - trending
    reasoning: trending (becoming popular) = Trending
  - number: 2
    initials: H
    clue: A symbol that turns a word into a category — the pound sign went all social media.
    answer: Hashtag
    aliases:
    - hashtag
    reasoning: 'hash (the # symbol) + tag = Hashtag'
  - number: 3
    initials: T
    clue: A person hiding behind a screen being horrible to strangers — not the kind that lives under bridges.
    answer: Trolling
    aliases:
    - trolling
    reasoning: trolling (harassing online, from troll) = Trolling
